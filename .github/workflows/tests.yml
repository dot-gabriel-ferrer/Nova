name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e "nova-py[plots,analysis,dev]"

      - name: Run tests
        run: |
          cd nova-py
          python -m pytest tests/ -v --cov=nova --cov-report=term-missing

      - name: Check import
        run: |
          python -c "import nova; print(f'NOVA {nova.__version__} imported successfully')"
